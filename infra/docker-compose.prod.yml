# JBR Marketplace — production compose.
# REQUIRED secrets (define in the shell env or an .env file next to this file; do NOT
# commit them): POSTGRES_PASSWORD, REDIS_PASSWORD. App secrets live in web/.env.production.
# Postgres/Redis/app are bound to 127.0.0.1 only — they MUST NOT be reachable from the
# public internet. For remote DB/Redis admin use an SSH tunnel. Public ingress is nginx.
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jbr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jbr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set a strong secret in the environment}
      POSTGRES_DB: jbr_marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Localhost-only: never publish the database to 0.0.0.0.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jbr_user -d jbr_marketplace" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jbr-network

  # Redis for sessions/caching/rate-limit
  redis:
    image: redis:7-alpine
    container_name: jbr-redis
    restart: unless-stopped
    # Require a password (Redis is unauthenticated by default) and persist with AOF.
    # noeviction: never drop keys under memory pressure — BullMQ jobs/sessions must
    # not be evicted (fail writes loudly instead of losing queued work silently).
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required — set a strong secret in the environment}", "--appendonly", "yes", "--maxmemory-policy", "noeviction" ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # Localhost-only: never publish Redis to 0.0.0.0.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jbr-network

  # Next.js Application
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: jbr-app
    restart: unless-stopped
    # Fronted by nginx; bind to localhost so the app isn't reachable directly,
    # bypassing TLS/headers. Remove this block entirely if no local debugging is needed.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jbr_user:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/jbr_marketplace
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    env_file:
      - ./web/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jbr-network

  # Nginx Reverse Proxy (public ingress)
  nginx:
    image: nginx:alpine
    container_name: jbr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - jbr-network

volumes:
  postgres_data:
  redis_data:


networks:
  jbr-network:
    driver: bridge
